<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Dashboard — Rainforest EMU-2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f6f8;--card:#ffffff;--border:#e2e5e9;--text:#1a1d21;--text2:#5f6673;--text3:#9da3ae;
  --accent:#2563eb;--green:#16a34a;--amber:#ca8a04;--red:#dc2626;--purple:#7c3aed;
  --teal:#0d9488;--coral:#ea580c;--projection:#7c3aed;--radius:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif
}
body{background:var(--bg);color:var(--text);font-family:var(--font);padding:16px;max-width:1200px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:600}
.header .rates{font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap}
.header .rates span{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:#fff}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.day-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.day-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:#fff;transition:all .15s}
.day-tab:hover{border-color:var(--text3);color:var(--text)}
.day-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.day-tab.projection{border-color:var(--projection);color:var(--projection);background:rgba(124,58,237,0.04);font-weight:600}
.day-tab.projection.active{background:var(--projection);color:#fff;border-color:var(--projection)}
.day-tab.projection::before{content:'📈 ';font-size:10px}
.day-tab-separator{width:1px;height:18px;background:var(--border);margin:0 4px}
.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.grid-2,.grid-3{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-sm{padding:12px 14px}
.card .label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card .value{font-size:24px;font-weight:600}
.card .sub{font-size:12px;color:var(--text2);margin-top:2px}
.chart-wrap{position:relative;height:280px}
.chart-wrap-tall{height:340px}
.section-title{font-size:15px;font-weight:600;margin:20px 0 10px;color:var(--text)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-mp{background:rgba(220,38,38,.1);color:var(--red)}
.badge-sop{background:rgba(13,148,136,.1);color:var(--teal)}
.badge-op{background:rgba(37,99,235,.1);color:var(--accent)}
.badge-onpeak{background:rgba(220,38,38,.15);color:var(--red)}
.badge-midpeak{background:rgba(202,138,4,.15);color:var(--amber)}
.badge-offpeak{background:rgba(13,148,136,.1);color:var(--teal)}
.view-panel{display:none}
.view-panel.active{display:block}
.tou-legend{display:flex;gap:14px;font-size:11px;color:var(--text2);margin-bottom:8px;flex-wrap:wrap}
.tou-legend span{display:flex;align-items:center;gap:4px}
.tou-legend .dot{width:8px;height:8px;border-radius:2px}
.hvac-banner{padding:10px 14px;border-radius:var(--radius);background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.15);font-size:12px;color:var(--accent);margin-bottom:14px}
.pump-banner{padding:10px 14px;border-radius:var(--radius);background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.15);font-size:12px;color:var(--purple);margin-bottom:14px}
.projection-banner{padding:12px 16px;border-radius:var(--radius);background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.2);font-size:12px;color:var(--purple);margin-bottom:14px;line-height:1.5}
.projection-banner strong{color:var(--purple)}
.sample-warning{padding:8px 12px;border-radius:6px;background:rgba(202,138,4,.08);border:1px solid rgba(202,138,4,.2);font-size:11px;color:var(--amber);margin-bottom:10px}
.savings-card{padding:16px;border-radius:var(--radius);background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.2);margin-top:14px}
.savings-card .savings-title{font-size:14px;font-weight:600;color:var(--green);margin-bottom:6px}
.savings-card .savings-body{font-size:13px;color:var(--text2);line-height:1.5}
table.pump-table{width:100%;border-collapse:collapse;font-size:13px}
table.pump-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--text2);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
table.pump-table td{padding:6px 10px;border-bottom:1px solid var(--border)}
table.pump-table tr:last-child td{border-bottom:none}
.assumption-box{padding:12px 14px;border-radius:var(--radius);background:rgba(0,0,0,.025);border:1px dashed var(--border);font-size:12px;color:var(--text2);margin:10px 0}
.assumption-box strong{color:var(--text)}
</style>
</head>

<div class="header">

// ============== PROJECTION ENGINE ==============
function buildProjection(projKey) {
  const cfg = PROJECTION_CONFIG[projKey];
  // Use most recent N observed days
  const window = OBSERVED_KEYS.slice(-cfg.windowDays);
  const daysUsed = window.length;
  
  // Aggregate hourly stats from window
  const stats = {};
  for (let h = 0; h < 24; h++) stats[h] = {means:[], maxes:[], mins:[], temps:[]};
  let pumpEventCount = 0;
  const pumpByPeriod = {mid_peak:0, off_peak:0, super_off_peak:0};
  window.forEach(dk => {
    DAYS[dk].forEach(h => {
      stats[h.hour].means.push(h.mean);
      stats[h.hour].maxes.push(h.max);
      stats[h.hour].mins.push(h.min);
      if (h.temp != null) stats[h.hour].temps.push(h.temp);
      if (h.pump_high) { pumpEventCount++; pumpByPeriod[h.period]++; }
    });
  });
  
  const avgHourly = [];
  for (let h = 0; h < 24; h++) {
    const s = stats[h];
    if (s.means.length > 0) {
      avgHourly.push({
        hour: h,
        label: h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm',
        mean: s.means.reduce((a,b)=>a+b,0)/s.means.length,
        max: Math.max(...s.maxes),
        min: Math.min(...s.mins),
        temp: s.temps.length ? s.temps.reduce((a,b)=>a+b,0)/s.temps.length : null
      });
    }
  }
  const avgDailyKwh = avgHourly.reduce((a,h)=>a+h.mean, 0);
  
  // Determine projection date range (starts day after last observed)
  const lastObserved = OBSERVED_KEYS[OBSERVED_KEYS.length - 1];
  const [y,m,d] = lastObserved.split('-').map(Number);
  const startDate = new Date(y, m-1, d+1);
  
  // Count winter vs summer days in projection window
  const seasonDays = [];
  let winterDays = 0, summerDays = 0;
  for (let i = 0; i < cfg.projectionDays; i++) {
    const day = new Date(startDate);
    day.setDate(day.getDate() + i);
    const month = day.getMonth() + 1; // 1-12
    const season = (month >= 6 && month <= 9) ? 'summer' : 'winter';
    if (season === 'summer') summerDays++;
    else winterDays++;
    seasonDays.push({date: day, season});
  }
  
  // Calculate hourly costs (summed across all projection days)
  // For each hour-of-day, total monthly contribution = mean × (winter_days × winter_rate + summer_days × summer_rate)
  const hourlyProjection = avgHourly.map(h => {
    const winterRate = (h.hour >= 16 && h.hour < 21) ? RATES.mid_peak
                     : (h.hour >= 8 && h.hour < 16) ? RATES.super_off_peak
                     : RATES.off_peak;
    // Summer: 4-9pm = 5/7 weekday + 2/7 weekend
    const summerRate = (h.hour >= 16 && h.hour < 21)
                     ? (5/7) * SUMMER_RATES.on_peak + (2/7) * SUMMER_RATES.weekend_mid_peak
                     : SUMMER_RATES.off_peak;
    const cost = h.mean * (winterDays * winterRate + summerDays * summerRate);
    const winterPeriod = (h.hour >= 16 && h.hour < 21) ? 'mid_peak'
                       : (h.hour >= 8 && h.hour < 16) ? 'super_off_peak'
                       : 'off_peak';
    const summerPeriod = (h.hour >= 16 && h.hour < 21) ? 'on_peak' : 'off_peak';
    return {
      hour: h.hour, label: h.label, mean: h.mean, max: h.max, min: h.min, temp: h.temp,
      winterPeriod, summerPeriod, cost, winterRate, summerRate
    };
  });
  
  // Period breakdowns (totals across projection)
  let winterByPeriod = {mid_peak:{kwh:0,cost:0}, off_peak:{kwh:0,cost:0}, super_off_peak:{kwh:0,cost:0}};
  let summerByPeriod = {on_peak:{kwh:0,cost:0}, weekend_mid_peak:{kwh:0,cost:0}, off_peak:{kwh:0,cost:0}};
  
  avgHourly.forEach(h => {
    const winterPeriod = (h.hour >= 16 && h.hour < 21) ? 'mid_peak'
                       : (h.hour >= 8 && h.hour < 16) ? 'super_off_peak'
                       : 'off_peak';
    winterByPeriod[winterPeriod].kwh += h.mean * winterDays;
    winterByPeriod[winterPeriod].cost += h.mean * winterDays * RATES[winterPeriod];
    
    if (h.hour >= 16 && h.hour < 21) {
      // Summer 4-9pm: split 5/7 weekday on-peak, 2/7 weekend mid-peak
      summerByPeriod.on_peak.kwh += h.mean * summerDays * 5/7;
      summerByPeriod.on_peak.cost += h.mean * summerDays * 5/7 * SUMMER_RATES.on_peak;
      summerByPeriod.weekend_mid_peak.kwh += h.mean * summerDays * 2/7;
      summerByPeriod.weekend_mid_peak.cost += h.mean * summerDays * 2/7 * SUMMER_RATES.weekend_mid_peak;
    } else {
      summerByPeriod.off_peak.kwh += h.mean * summerDays;
      summerByPeriod.off_peak.cost += h.mean * summerDays * SUMMER_RATES.off_peak;
    }
  });
  
  const energyCost = ['mid_peak','off_peak','super_off_peak'].reduce((a,p)=>a+winterByPeriod[p].cost, 0)
                   + ['on_peak','weekend_mid_peak','off_peak'].reduce((a,p)=>a+summerByPeriod[p].cost, 0);
  const baseService = cfg.projectionDays * BASE_DAILY;
  const totalCost = energyCost + baseService;
  const totalKwh = avgDailyKwh * cfg.projectionDays;
  
  // Pump projection (apply same TOU split as observed window)
  const pumpDailyKwh = PUMP_HIGH_KW * PUMP_DAILY_HIGH_HRS + PUMP_MED_KW * PUMP_DAILY_MED_HRS;
  // Weighted current rate from observed pump events (winter rates)
  let pumpCurrentRate = RATES.mid_peak;
  if (pumpEventCount > 0) {
    pumpCurrentRate = (pumpByPeriod.mid_peak * RATES.mid_peak +
                       pumpByPeriod.off_peak * RATES.off_peak +
                       pumpByPeriod.super_off_peak * RATES.super_off_peak) / pumpEventCount;
  }
  // Summer equivalent: mid_peak events → summer blended (5/7 on + 2/7 mid), others → off
  let pumpSummerRate = SUMMER_RATES.on_peak;
  if (pumpEventCount > 0) {
    const midShare = pumpByPeriod.mid_peak / pumpEventCount;
    const offShare = (pumpByPeriod.off_peak + pumpByPeriod.super_off_peak) / pumpEventCount;
    pumpSummerRate = midShare * ((5/7)*SUMMER_RATES.on_peak + (2/7)*SUMMER_RATES.weekend_mid_peak)
                   + offShare * SUMMER_RATES.off_peak;
  }
  const pumpWinterCost = pumpDailyKwh * winterDays * pumpCurrentRate;
  const pumpSummerCost = pumpDailyKwh * summerDays * pumpSummerRate;
  const pumpCurrentTotal = pumpWinterCost + pumpSummerCost;
  const pumpOptimalWinter = pumpDailyKwh * winterDays * RATES.super_off_peak;
  const pumpOptimalSummer = pumpDailyKwh * summerDays * SUMMER_RATES.off_peak;
  const pumpOptimalTotal = pumpOptimalWinter + pumpOptimalSummer;
  
  return {
    cfg, daysUsed, avgHourly, hourlyProjection, avgDailyKwh, totalKwh, totalCost, energyCost, baseService,
    winterDays, summerDays, winterByPeriod, summerByPeriod, startDate, seasonDays,
    pumpEventCount, pumpByPeriod, pumpDailyKwh, pumpCurrentTotal, pumpOptimalTotal,
    pumpCurrentRate, pumpSummerRate
  };
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function projectionContextHtml(p) {
  const endDate = new Date(p.startDate);
  endDate.setDate(endDate.getDate() + p.cfg.projectionDays - 1);
  const seasonNote = (p.winterDays > 0 && p.summerDays > 0)
    ? `<strong>${p.winterDays}</strong> day${p.winterDays>1?'s':''} at winter rates + <strong>${p.summerDays}</strong> day${p.summerDays>1?'s':''} at summer rates`
    : (p.summerDays > 0 ? '<strong>Summer rates</strong> apply (Jun 1 – Sep 30)' : '<strong>Winter rates</strong> apply (Oct 1 – May 31)');
  const sampleWarning = p.daysUsed < p.cfg.windowDays
    ? `<div class="sample-warning">⚠️ Only <strong>${p.daysUsed}</strong> day${p.daysUsed>1?'s':''} of data available; ideal window is ${p.cfg.windowDays} days. Projection quality will improve as more data accumulates.</div>` : '';
  return `<div class="projection-banner">
    📈 <strong>${p.cfg.title}: ${formatDate(p.startDate)} – ${formatDate(endDate)}</strong> · ${p.cfg.projectionDays} days projected from rolling ${p.daysUsed}-day window · ${seasonNote}.
  </div>${sampleWarning}`;
}

document.getElementById('mainTabs').addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if(!t) return;
  document.querySelectorAll('#mainTabs .tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.querySelectorAll('.view-panel').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+t.dataset.view).classList.add('active');
});

function setupDayTabs(containerId, callback) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  let sepAdded = false;
  DAY_KEYS.forEach((dk,i) => {
    if (PROJECTION_KEYS.includes(dk) && !sepAdded) {
      const sep = document.createElement('div'); sep.className = 'day-tab-separator';
      c.appendChild(sep); sepAdded = true;
    }
    const btn = document.createElement('div');
    btn.className = 'day-tab' + (i===0?' active':'') + (PROJECTION_KEYS.includes(dk) ? ' projection' : '');
    btn.textContent = DAY_LABELS[dk];
    btn.dataset.day = dk;
    btn.addEventListener('click', () => {
      c.querySelectorAll('.day-tab').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');
      callback(dk);
    });
    c.appendChild(btn);
  });
  if(DAY_KEYS.length) callback(DAY_KEYS[0]);
}

    const ctx = chart.ctx, xAxis = chart.scales.x, yAxis = chart.scales.y;
    const periods = chart.options.plugins.touBackground.periods;
    const bgMap = chart.options.plugins.touBackground.bgMap || PERIOD_BG;
    const n = periods.length;
    for(let i=0;i<n;i++) {
      const xCenter = xAxis.getPixelForValue(i);
      const halfStep = i<n-1 ? (xAxis.getPixelForValue(i+1)-xCenter)/2 : (xCenter-xAxis.getPixelForValue(i-1))/2;
      const x0 = Math.max(xCenter - halfStep, xAxis.left);
      const x1 = Math.min(xCenter + halfStep, xAxis.right);
      ctx.save(); ctx.fillStyle = bgMap[periods[i]] || 'transparent';
      ctx.fillRect(x0, yAxis.top, x1-x0, yAxis.bottom - yAxis.top);
      ctx.restore();
    }
  }
};

function renderCostProjection(dk) {
  const p = buildProjection(dk);
  // Build pie data — combine winter + summer period buckets meaningfully
  const pieLabels = [], pieValues = [], pieColors = [];
  if (p.winterDays > 0) {
    if (p.winterByPeriod.mid_peak.cost > 0.01) { pieLabels.push('Winter mid-peak'); pieValues.push(p.winterByPeriod.mid_peak.cost); pieColors.push(PERIOD_COLORS.mid_peak); }
    if (p.winterByPeriod.off_peak.cost > 0.01) { pieLabels.push('Winter off-peak'); pieValues.push(p.winterByPeriod.off_peak.cost); pieColors.push(PERIOD_COLORS.off_peak); }
    if (p.winterByPeriod.super_off_peak.cost > 0.01) { pieLabels.push('Winter super off-peak'); pieValues.push(p.winterByPeriod.super_off_peak.cost); pieColors.push(PERIOD_COLORS.super_off_peak); }
  }
  if (p.summerDays > 0) {
    if (p.summerByPeriod.on_peak.cost > 0.01) { pieLabels.push('Summer on-peak'); pieValues.push(p.summerByPeriod.on_peak.cost); pieColors.push(SUMMER_COLORS.on_peak); }
    if (p.summerByPeriod.weekend_mid_peak.cost > 0.01) { pieLabels.push('Summer weekend mid-peak'); pieValues.push(p.summerByPeriod.weekend_mid_peak.cost); pieColors.push(SUMMER_COLORS.weekend_mid_peak); }
    if (p.summerByPeriod.off_peak.cost > 0.01) { pieLabels.push('Summer off-peak'); pieValues.push(p.summerByPeriod.off_peak.cost); pieColors.push(SUMMER_COLORS.off_peak); }
  }
  
  // KPI cards: total + 3 most relevant period totals
  let kpiCards = `<div class="card card-sm"><div class="label">Period total</div><div class="value" style="color:var(--purple)">$${p.totalCost.toFixed(2)}</div><div class="sub">${p.totalKwh.toFixed(0)} kWh + base svc</div></div>`;
  if (p.winterDays > 0 && p.summerDays > 0) {
    // Mixed - show winter total + summer total
    const winterTotal = ['mid_peak','off_peak','super_off_peak'].reduce((a,k)=>a+p.winterByPeriod[k].cost, 0);

    kpiCards += `<div class="card card-sm"><div class="label">Base service</div><div class="value">$${p.baseService.toFixed(2)}</div><div class="sub">${p.cfg.projectionDays} × $${BASE_DAILY.toFixed(3)}/day</div></div>`;
  } else if (p.winterDays > 0) {
    kpiCards += `<div class="card card-sm"><div class="label">Mid-peak <span class="badge badge-mp">$0.411</span></div><div class="value">$${p.winterByPeriod.mid_peak.cost.toFixed(2)}</div><div class="sub">${p.winterByPeriod.mid_peak.kwh.toFixed(0)} kWh</div></div>`;

  } else {

  }
  
  document.getElementById('costContent').innerHTML = `
    ${projectionContextHtml(p)}
    <div class="grid grid-4" style="margin-bottom:14px">${kpiCards}</div>

function renderTempProjection(dk) {
  const p = buildProjection(dk);
  const tempsWithData = p.avgHourly.filter(h => h.temp != null);
  const avgT = tempsWithData.length ? tempsWithData.reduce((a,h)=>a+h.temp,0)/tempsWithData.length : null;
  const mxT = tempsWithData.length ? Math.max(...tempsWithData.map(h=>h.temp)) : null;
  const mnT = tempsWithData.length ? Math.min(...tempsWithData.map(h=>h.temp)) : null;
  const powers = p.avgHourly.map(h=>h.mean);
  const pMax = Math.max(...powers);
  document.getElementById('tempContent').innerHTML = `
    ${projectionContextHtml(p)}
    <div class="grid grid-3" style="margin-bottom:14px">
      <div class="card card-sm"><div class="label">Avg indoor temp</div><div class="value">${avgT!=null?Math.round(avgT)+'°F':'-'}</div><div class="sub">From window avg</div></div>
      <div class="card card-sm"><div class="label">Daily high</div><div class="value" style="color:var(--coral)">${mxT!=null?Math.round(mxT)+'°F':'-'}</div><div class="sub">Avg peak in window</div></div>
      <div class="card card-sm"><div class="label">Daily low</div><div class="value" style="color:var(--accent)">${mnT!=null?Math.round(mnT)+'°F':'-'}</div><div class="sub">Avg low in window</div></div>
    </div>
    <div class="section-title">Average daily pattern (power vs temp from thermostat)</div>
    <div class="card"><div class="chart-wrap chart-wrap-tall"><canvas id="tempDayChart"></canvas></div></div>`;
  destroyChart('tempDayChart');
  if (tempsWithData.length === 0) return;
  const tempPad = Math.max(3, Math.round((mxT-mnT)*0.25));
  const powerPad = Math.max(0.5, pMax*0.15);
  charts.tempDayChart = new Chart(document.getElementById('tempDayChart'), {
    type:'line',data:{labels:p.avgHourly.map(h=>h.label),datasets:[
      {label:'Power (kW)',data:powers,borderColor:'#7c3aed',borderWidth:2,pointRadius:0,fill:false,tension:.3,yAxisID:'y'},
      {label:'Temp (°F)',data:p.avgHourly.map(h=>h.temp),borderColor:'#ea580c',borderWidth:2,pointRadius:0,borderDash:[5,3],fill:false,tension:.3,yAxisID:'y1'}
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:TICK_COLOR,font:{size:11}}},datalabels:{display:false}},
      scales:{
        x:{ticks:{color:TICK_COLOR,maxRotation:0},grid:{display:false}},
        y:{position:'left',min:0,max:Math.ceil(pMax+powerPad),title:{display:true,text:'kW',color:TICK_COLOR},ticks:{color:TICK_COLOR},grid:{color:GRID_COLOR}},
        y1:{position:'right',min:Math.floor(mnT-tempPad),max:Math.ceil(mxT+tempPad),title:{display:true,text:'°F',color:TICK_COLOR},ticks:{color:TICK_COLOR},grid:{drawOnChartArea:false}}
      }}
  });
}
setupDayTabs('tempDayTabs', renderTempDay);

// ============== POOL PUMP ==============
function renderPumpDay(dk) {
  if (PROJECTION_KEYS.includes(dk)) return renderPumpProjection(dk);
  const hours = DAYS[dk];
  const detectedEvents = hours.filter(h => h.pump_high);
  const eventsByPeriod = {mid_peak:0, super_off_peak:0, off_peak:0};
  detectedEvents.forEach(e => eventsByPeriod[e.period]++);
  const assumedDailyKwh = (PUMP_HIGH_KW * PUMP_DAILY_HIGH_HRS) + (PUMP_MED_KW * PUMP_DAILY_MED_HRS);
  const totalEvents = detectedEvents.length;
  let weightedRate;
  if (totalEvents > 0) weightedRate = detectedEvents.reduce((sum, e) => sum + e.rate, 0) / totalEvents;
  else weightedRate = RATES.mid_peak;
  const currentDailyCost = assumedDailyKwh * weightedRate;
  const optimalDailyCost = assumedDailyKwh * RATES.super_off_peak;
  const dailySavings = currentDailyCost - optimalDailyCost;
  const monthlyCurrent = currentDailyCost * 30;
  const monthlyOptimal = optimalDailyCost * 30;
  const monthlySavings = dailySavings * 30;
  const annualSavings = monthlySavings * 12;
  let eventsHtml = '';
  if (detectedEvents.length === 0) {
    eventsHtml = '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:14px">No high-power events detected (max ≤ 4.5 kW)</td></tr>';
  } else {
    detectedEvents.forEach(e => {
      const badge = e.period === 'mid_peak' ? 'badge-mp' : e.period === 'off_peak' ? 'badge-op' : 'badge-sop';
      eventsHtml += `<tr><td>${e.label}</td><td><span class="badge ${badge}">${PERIOD_NAMES[e.period]}</span></td><td>${e.max.toFixed(1)} kW</td><td>${e.mean.toFixed(2)} kW</td><td>$${e.rate.toFixed(3)}/kWh</td></tr>`;
    });
  }
  document.getElementById('pumpContent').innerHTML = `
    <div class="pump-banner">🏊 <strong>Pentair WhisperFlo VST</strong> — Detection: hours where max ≥ 4.5 kW AND mean ≥ 2.5 kW (likely high-speed cycles). Medium-speed filtration blends with baseload.</div>
    <div class="grid grid-4" style="margin-bottom:14px">
      <div class="card card-sm"><div class="label">High-speed events</div><div class="value">${detectedEvents.length}</div><div class="sub">Detected this day</div></div>
      <div class="card card-sm"><div class="label">During mid-peak</div><div class="value" style="color:var(--red)">${eventsByPeriod.mid_peak}</div><div class="sub">4pm–9pm</div></div>
      <div class="card card-sm"><div class="label">During off-peak</div><div class="value" style="color:var(--accent)">${eventsByPeriod.off_peak}</div><div class="sub">9pm–8am</div></div>
      <div class="card card-sm"><div class="label">During super off-peak</div><div class="value" style="color:var(--teal)">${eventsByPeriod.super_off_peak}</div><div class="sub">8am–4pm</div></div>
    </div>
    <div class="section-title">Detected high-power events</div>
    <div class="card" style="overflow-x:auto"><table class="pump-table"><thead><tr><th>Hour</th><th>TOU period</th><th>Peak</th><th>Mean</th><th>Rate</th></tr></thead><tbody>${eventsHtml}</tbody></table></div>
    <div class="section-title" style="margin-top:18px">Daily cost estimate (typical schedule)</div>
    <div class="assumption-box"><strong>Assumption:</strong> ${PUMP_DAILY_HIGH_HRS} hr high (${PUMP_HIGH_KW} kW) + ${PUMP_DAILY_MED_HRS} hrs medium (${PUMP_MED_KW} kW) = <strong>${assumedDailyKwh.toFixed(2)} kWh/day</strong></div>
    <div class="grid grid-3" style="margin-bottom:14px">
      <div class="card card-sm"><div class="label">Pump kWh/day</div><div class="value">${assumedDailyKwh.toFixed(2)}</div></div>
      <div class="card card-sm"><div class="label">Current schedule</div><div class="value" style="color:var(--red)">$${currentDailyCost.toFixed(2)}</div><div class="sub">$${weightedRate.toFixed(3)}/kWh weighted</div></div>
      <div class="card card-sm"><div class="label">Super off-peak</div><div class="value" style="color:var(--green)">$${optimalDailyCost.toFixed(2)}</div><div class="sub">All hours at $0.236</div></div>
    </div>
    <div class="savings-card"><div class="savings-title">💡 Savings opportunity</div><div class="savings-body">
      Shift pump cycles to <strong>super off-peak (8am–4pm)</strong> → save ~<strong>$${monthlySavings.toFixed(2)}/month</strong> (≈ <strong>$${annualSavings.toFixed(0)}/year</strong>).
    </div></div>`;
}

function renderPumpProjection(dk) {
  const p = buildProjection(dk);
  const pumpMonthlyKwh = p.pumpDailyKwh * p.cfg.projectionDays;
  const savings = p.pumpCurrentTotal - p.pumpOptimalTotal;
  
  document.getElementById('pumpContent').innerHTML = `
    ${projectionContextHtml(p)}
    <div class="pump-banner">🏊 <strong>Pentair WhisperFlo VST</strong> — Assumed ${PUMP_DAILY_HIGH_HRS}hr high + ${PUMP_DAILY_MED_HRS}hr medium = ${p.pumpDailyKwh.toFixed(2)} kWh/day. Current schedule timing inferred from detected high-speed events in rolling window.</div>
    <div class="grid grid-4" style="margin-bottom:14px">
      <div class="card card-sm"><div class="label">Pump kWh total</div><div class="value">${pumpMonthlyKwh.toFixed(0)}</div><div class="sub">${p.pumpDailyKwh.toFixed(2)} × ${p.cfg.projectionDays} days</div></div>
      <div class="card card-sm"><div class="label">At current schedule</div><div class="value" style="color:var(--red)">$${p.pumpCurrentTotal.toFixed(2)}</div><div class="sub">${p.pumpEventCount} events detected in window</div></div>
      <div class="card card-sm"><div class="label">At cheapest hours</div><div class="value" style="color:var(--green)">$${p.pumpOptimalTotal.toFixed(2)}</div><div class="sub">Winter: super off-peak / Summer: off-peak</div></div>
      <div class="card card-sm"><div class="label">Potential savings</div><div class="value" style="color:var(--teal)">$${savings.toFixed(2)}</div><div class="sub">${p.pumpCurrentTotal>0?(savings/p.pumpCurrentTotal*100).toFixed(0):0}% reduction</div></div>
    </div>
    <div class="section-title">Detected pump events distribution (from ${p.daysUsed}-day window)</div>
    <div class="card" style="margin-bottom:14px">
      <table class="pump-table">
        <thead><tr><th>Period in window</th><th>Events detected</th><th>Share</th></tr></thead>
        <tbody>
          <tr><td><span class="badge badge-mp">Mid-peak (4–9pm)</span></td><td>${p.pumpByPeriod.mid_peak}</td><td>${p.pumpEventCount>0?(p.pumpByPeriod.mid_peak/p.pumpEventCount*100).toFixed(0):0}%</td></tr>
          <tr><td><span class="badge badge-sop">Super off-peak (8am–4pm)</span></td><td>${p.pumpByPeriod.super_off_peak}</td><td>${p.pumpEventCount>0?(p.pumpByPeriod.super_off_peak/p.pumpEventCount*100).toFixed(0):0}%</td></tr>
          <tr><td><span class="badge badge-op">Off-peak (9pm–8am)</span></td><td>${p.pumpByPeriod.off_peak}</td><td>${p.pumpEventCount>0?(p.pumpByPeriod.off_peak/p.pumpEventCount*100).toFixed(0):0}%</td></tr>
        </tbody>
      </table>
    </div>
    <div class="savings-card"><div class="savings-title">💡 Pump optimization for ${p.cfg.title.toLowerCase()}</div><div class="savings-body">
      Shifting pump to cheapest available rate saves ~<strong>$${savings.toFixed(2)}</strong> over ${p.cfg.projectionDays} days.
      ${p.summerDays>0 && p.winterDays>0 ? `<br><br><strong>Note:</strong> This projection crosses the winter/summer boundary on Jun 1. Winter has super off-peak ($0.236/kWh, 8am–4pm), summer collapses to just off-peak ($0.246/kWh, all non-4–9pm hours).` : ''}
    </div></div>`;
}
setupDayTabs('pumpDayTabs', renderPumpDay);
</script>
